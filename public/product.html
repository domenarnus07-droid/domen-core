<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domen Core - Izdelek</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="photos/domen-core-logo.svg" type="image/svg+xml">
</head>
<body class="page-product">
  <main class="product-page-wrap">
    <article id="product-detail" class="product-detail-card">
      <div class="product-detail-grid product-detail-skeleton">
        <div class="product-detail-image-wrap">
          <div class="skeleton skeleton-img"></div>
        </div>
        <div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-btn"></div>
        </div>
      </div>
    </article>
  </main>

  <section id="similar-products" class="similar-products-section" style="display:none;">
    <div class="similar-products-inner">
      <h2 class="similar-products-title">Morda ti bo všeč tudi</h2>
      <div id="similar-products-grid" class="similar-products-grid"></div>
    </div>
  </section>

  <script src="zo.js"></script>
  <script>
    // Aliasi za window.* iz zo.js
    const esc = window.escapeHtml;
    const formatPrice = window.formatPrice;
    const getDisplayPrices = window.getDisplayPrices;
    const isOldPriceVisible = window.isOldPriceVisible;

    // Normalizira pot do slike in doda fallback.
    function normalizeImageSrc(raw) {
      const value = String(raw || '').trim().replace(/\\/g, '/');
      if (!value) return 'photos/1.png';
      return value;
    }

    // Vrne možne velikosti za izdelek.
    function getSizeOptions(product) {
      if (Array.isArray(product.sizes) && product.sizes.length) return product.sizes;
      const hay = `${product.name || ''} ${product.description || ''}`.toLowerCase();
      if (hay.includes('zensk')) {
        return ['36', '37', '38', '39', '40', '41', '42'];
      }
      return ['40', '41', '42', '43', '44', '45', '46', '47', '48'];
    }

    // Zgradi mapo zaloge po velikostih.
    function getSizeStockMap(product) {
      const raw = product && typeof product.sizeStock === 'object' ? product.sizeStock : {};
      const out = {};
      const sizes = getSizeOptions(product);
      sizes.forEach((size) => {
        const amount = Number(raw[size]);
        out[size] = Number.isFinite(amount) && amount >= 0 ? Math.floor(amount) : 0;
      });
      const total = Object.values(out).reduce((acc, val) => acc + Number(val || 0), 0);
      const fallback = Math.max(0, Math.floor(Number(product?.stock || 0)));
      if (total <= 0 && fallback > 0 && sizes.length) {
        const each = Math.floor(fallback / sizes.length);
        let rem = fallback % sizes.length;
        sizes.forEach((size) => {
          out[size] = each + (rem > 0 ? 1 : 0);
          if (rem > 0) rem -= 1;
        });
      }
      return out;
    }

    // Poenoti zapis velikosti za primerjavo.
    function normalizeSizeKey(size) {
      return String(size || '').trim().replace(',', '.');
    }

    let _pCartCache = null;
    function _pCart() { return _pCartCache !== null ? _pCartCache : (_pCartCache = JSON.parse(localStorage.getItem('kosarica') || '[]')); }
    window.addEventListener('cart:updated', () => { _pCartCache = null; });
    window.addEventListener('storage', (e) => { if (e.key === 'kosarica') _pCartCache = null; });

    // Preveri, koliko iste velikosti je že v košarici.
    function getCartReservedQty(productId, size) {
      const safeProductId = String(productId || '').trim();
      const safeSize = normalizeSizeKey(size);
      if (!safeProductId || !safeSize) return 0;
      const cart = _pCart();
      if (!Array.isArray(cart)) return 0;
      return cart.reduce((acc, item) => {
        const sameProduct = String(item?.productId || '').trim() === safeProductId;
        const sameSize = normalizeSizeKey(item?.size || '') === safeSize;
        if (!sameProduct || !sameSize) return acc;
        return acc + Math.max(1, Math.floor(Number(item?.kolicina || 1)));
      }, 0);
    }

    // Vrne zalogo po odšteti količini iz košarice.
    function getAvailableStock(product, selectedSize) {
      const size = normalizeSizeKey(selectedSize);
      const sizeStockMap = getSizeStockMap(product);
      let rawStock = 0;
      if (size) {
        if (Object.prototype.hasOwnProperty.call(sizeStockMap, size)) {
          rawStock = Number(sizeStockMap[size] || 0);
        } else {
          const matchedKey = Object.keys(sizeStockMap).find((k) => normalizeSizeKey(k) === size);
          rawStock = matchedKey ? Number(sizeStockMap[matchedKey] || 0) : 0;
        }
      } else {
        rawStock = Number(product?.stock || 0);
      }
      const safeRaw = Number.isFinite(rawStock) ? Math.max(0, Math.floor(rawStock)) : 0;
      const reserved = getCartReservedQty(product?._id, size);
      return Math.max(0, safeRaw - reserved);
    }

    // Vrne stanje zaloge za prikaz.
    function stockState(stock) {
      if (stock <= 0) return { text: 'Razprodano', cls: 'stock-out' };
      if (stock === 1) return { text: 'Zadnji kos', cls: 'stock-last' };
      if (stock === 2) return { text: 'Samo še 2 kosa', cls: 'stock-low' };
      if (stock <= 4) return { text: `Samo še ${stock} kosi`, cls: 'stock-low' };
      return { text: `Na zalogi: ${stock} kosov`, cls: 'stock-ok' };
    }

    // Pove, ali je izdelek trenutno znižan.
    function isDiscountActive(product) {
      return isOldPriceVisible(product);
    }

    // Izriše podrobnosti izdelka na strani.
    function renderProduct(product) {
      const root = document.getElementById('product-detail');
      const image = esc(normalizeImageSrc(product.image));
      const sizeOptions = getSizeOptions(product)
        .map((s) => `<option value="${esc(s)}">${esc(s)}</option>`)
        .join('');
      const firstSize = getSizeOptions(product)[0] || '';
      const stock = getAvailableStock(product, firstSize);
      const stockInfo = stockState(stock);
      const pricing = getDisplayPrices(product);
      const oldPrice = isDiscountActive(product)
        ? `<span class="old-price">${formatPrice(pricing.regular)} EUR</span>`
        : '';

      root.innerHTML = `
        <a href="index.html" class="product-back-nav">← Nazaj v trgovino</a>
        <div class="product-detail-grid">
          <div class="product-detail-image-wrap">
            <img src="${image}" alt="${esc(product.name || 'Izdelek')}" class="product-detail-image" onerror="this.onerror=null;this.src='photos/1.png';">
          </div>
          <div class="product-detail-info">
            <p class="product-detail-brand">${esc(product.subcategory || 'Brand')}</p>
            <h1>${esc(product.name || 'Izdelek')}</h1>
            <p class="product-detail-desc">${esc(product.description || '')}</p>
            <p id="detail-stock-line" class="stock-line ${stockInfo.cls}">${stockInfo.text}</p>

            <hr class="product-detail-divider">
            <p class="product-detail-price">${formatPrice(pricing.discounted)} EUR ${oldPrice}</p>
            <hr class="product-detail-divider">

            <div class="product-detail-size">
              <div class="product-size-label-row">
                <label for="product-size">Velikost</label>
                <button type="button" class="size-guide-btn" onclick="showSizeGuide()">Vodič za velikosti</button>
              </div>
              <select id="product-size">${sizeOptions}</select>
            </div>

            <div class="product-detail-actions">
              <button id="add-to-cart-btn" class="product-add-btn" ${stock <= 0 ? 'disabled' : ''}>Dodaj v košarico</button>
              <a href="kosarica.html" class="product-back-link">Pojdi v košarico</a>
            </div>
          </div>
        </div>
      `;

      document.getElementById('add-to-cart-btn')?.addEventListener('click', async () => {
        const cartBtn = document.getElementById('add-to-cart-btn');
        if (cartBtn?.dataset.loading === '1') return;
        if (cartBtn) {
          cartBtn.dataset.loading = '1';
          cartBtn.disabled = true;
        }
        const size = document.getElementById('product-size')?.value || '';
        const cartHasDiscount = pricing.hasDiscount && isDiscountActive(product);
        try {
          await addToCart(
            product.name,
            Number(pricing.discounted),
            size,
            product._id,
            cartHasDiscount ? Number(pricing.regular) : 0,
            cartHasDiscount,
            String(product.image || 'photos/1.png')
          );
        } finally {
          if (cartBtn) delete cartBtn.dataset.loading;
          syncDetailStock();
        }
      });
      const sizeSelect = document.getElementById('product-size');
      const stockLine = document.getElementById('detail-stock-line');
      const cartBtn = document.getElementById('add-to-cart-btn');
      // Osveži zalogo in gumbe glede na izbrano velikost.
      function syncDetailStock() {
        const selectedSize = String(sizeSelect?.value || '').trim();
        const currentStock = getAvailableStock(product, selectedSize);
        const state = stockState(currentStock);
        if (stockLine) {
          stockLine.textContent = state.text;
          stockLine.classList.remove('stock-ok', 'stock-low', 'stock-last', 'stock-out');
          stockLine.classList.add(state.cls);
        }
        if (cartBtn) cartBtn.disabled = currentStock <= 0;
      }
      sizeSelect?.addEventListener('change', syncDetailStock);
      syncDetailStock();
      window.addEventListener('pageshow', syncDetailStock);
      window.addEventListener('storage', (e) => {
        if (e.key !== 'kosarica') return;
        syncDetailStock();
      });

    }

    // Naloži in prikaže podobne izdelke.
    async function loadSimilarProducts(current) {
      try {
        const sub = encodeURIComponent(String(current.subcategory || ''));
        const res = await fetch(`/api/products?subcategory=${sub}&limit=5`, { credentials: 'same-origin' });
        if (!res.ok) return;
        const data = await res.json();
        const all = Array.isArray(data) ? data : (data.products || []);
        const similar = all
          .filter((p) => String(p._id) !== String(current._id))
          .slice(0, 4);
        if (!similar.length) return;

        const grid = document.getElementById('similar-products-grid');
        grid.innerHTML = similar.map((p) => {
          const img = esc(String(p.image || 'photos/1.png').trim().replace(/\\/g, '/') || 'photos/1.png');
          const price = Number(p.price || 0).toFixed(2);
          const oldPrice = Number(p.oldPrice || 0);
          const discounted = oldPrice > 0 && oldPrice > p.price
            ? `<span class="similar-old-price">${oldPrice.toFixed(2)} EUR</span>` : '';
          return `
            <a href="product.html?id=${esc(String(p._id))}" class="similar-card">
              <div class="similar-card-img-wrap">
                <img src="${img}" alt="${esc(p.name || '')}" loading="lazy" onerror="this.onerror=null;this.src='photos/1.png';">
              </div>
              <div class="similar-card-info">
                <p class="similar-card-brand">${esc(p.subcategory || '')}</p>
                <p class="similar-card-name">${esc(p.name || '')}</p>
                <p class="similar-card-price">${price} EUR ${discounted}</p>
              </div>
            </a>`;
        }).join('');

        document.getElementById('similar-products').style.display = 'block';
      } catch (_e) {}
    }

    // Naloži izdelek iz API-ja in ga prikaže.
    async function loadProduct() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('product-detail').innerHTML = '<p>Manjka ID izdelka.</p>';
        return;
      }
      try {
        const res = await fetch(`/api/products/${encodeURIComponent(id)}`, { credentials: 'same-origin' });
        if (!res.ok) {
          document.getElementById('product-detail').innerHTML = '<p>Izdelek ni bil najden.</p>';
          return;
        }
        const product = await res.json();
        renderProduct(product);
        loadSimilarProducts(product);
      } catch (_err) {
        document.getElementById('product-detail').innerHTML = '<p>Napaka pri nalaganju izdelka.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
