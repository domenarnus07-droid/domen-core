<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domen Core - Moja Naročila</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="photos/domen-core-logo.svg" type="image/svg+xml">
</head>
<body class="page-my-orders">
  <main class="admin-hub my-orders-hub">
    <p class="admin-kicker">Uporabnik</p>
    <h1>Moja naročila</h1>
    <p class="admin-intro">Pregled vseh oddanih naročil.</p>
    <div id="orders-list" class="admin-grid my-orders-grid"></div>
  </main>

  <script src="zo.js"></script>
  <script>
    let productImageById = new Map();
    let productImageByName = new Map();

    // Varno ubeži HTML znake.
    function esc(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Poenoti ime izdelka za primerjavo.
    function normalizeName(text) {
      return String(text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    // Normalizira pot do slike in doda fallback.
    function normalizeImageSrc(raw) {
      const value = String(raw || '').trim();
      if (!value) return 'photos/1.png';
      if (/^(https?:\/\/|data:|blob:|\/)/i.test(value)) return value;
      return value;
    }

    // Naloži mapo slik za izdelke iz kataloga.
    async function loadProductImageMap() {
      productImageById = new Map();
      productImageByName = new Map();
      try {
        const res = await fetch('/api/products?sort=newest', { credentials: 'same-origin' });
        if (!res.ok) return;
        const items = await res.json().catch(() => []);
        if (!Array.isArray(items)) return;
        items.forEach((p) => {
          const id = String(p?._id || '').trim();
          const nameKey = normalizeName(p?.name || '');
          const src = normalizeImageSrc(p?.image || '');
          if (id && src) productImageById.set(id, src);
          if (nameKey && src && !productImageByName.has(nameKey)) productImageByName.set(nameKey, src);
        });
      } catch (_err) {
        // Če mapiranje slik spodleti, bo fallback ostal na privzeti sliki.
      }
    }

    // Vrne pravo sliko za izdelek v naročilu.
    function resolveOrderItemImage(item) {
      const direct = normalizeImageSrc(item?.image || '');
      if (direct && direct !== 'photos/1.png') return direct;
      const byId = productImageById.get(String(item?.productId || item?._id || '').trim());
      if (byId) return byId;
      const byName = productImageByName.get(normalizeName(item?.ime || ''));
      if (byName) return byName;
      return direct || 'photos/1.png';
    }

    // Formatira datum naročila.
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
    }

    // Izriše časovnico statusa naročila.
    function renderOrderTimeline(statusRaw) {
      const steps = ['Oddano', 'Potrjeno', 'Poslano', 'Dostavljeno'];
      const idx = Math.max(0, steps.indexOf(String(statusRaw || 'Oddano')));
      return `
        <div class="order-timeline">
          ${steps.map((step, i) => `
            <div class="order-timeline-step ${i < idx ? 'is-done' : ''} ${i === idx ? 'is-current' : ''} ${i > idx ? 'is-pending' : ''}">
              <span>${i + 1}</span>
              <small>${step}</small>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Sestavi HTML kartice za posamezno naročilo.
    function orderCard(order) {
      const statusRaw = String(order.status || 'Oddano');
      const statusClass = esc(statusRaw.toLowerCase());
      const items = (order.izdelki || [])
        .map((i) => `
          <div class="order-item-row">
            <img class="order-item-image" src="${esc(resolveOrderItemImage(i))}" alt="${esc(i.ime || 'Izdelek')}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='photos/1.png';">
            <div class="order-item-meta">
              <strong>${esc(i.ime || 'Izdelek')}</strong>
              <span>Št. ${esc(i.size || 'Univ.')} · ${Math.max(1, Math.floor(Number(i.kolicina || 1)))}x · ${Number(i.cena || 0).toFixed(2)} EUR</span>
            </div>
          </div>
        `)
        .join('');
      const hasDiscount = Number(order.discountAmount || 0) > 0;
      return `
        <article class="admin-card order-card">
          <div class="order-card-head">
            <div class="order-card-id">
              <span class="order-card-label">Naročilo</span>
              <strong>#${order._id.slice(-6).toUpperCase()}</strong>
            </div>
            <span class="order-status-badge order-status-${statusClass}">${esc(statusRaw)}</span>
          </div>
          <p class="order-card-date">${formatDate(order.datum)}</p>
          ${renderOrderTimeline(order.status)}
          <div class="order-items-wrap">${items || '<p>Ni izdelkov.</p>'}</div>
          <div class="order-card-totals">
            <div class="order-card-total-row"><span>Vmesna cena</span><span>${Number(order.itemsTotal || 0).toFixed(2)} EUR</span></div>
            ${hasDiscount ? `<div class="order-card-total-row is-discount"><span>Popust</span><span>−${Number(order.discountAmount || 0).toFixed(2)} EUR</span></div>` : ''}
            <div class="order-card-total-row is-final"><span>Skupaj</span><strong>${Number(order.finalTotal || 0).toFixed(2)} EUR</strong></div>
          </div>
        </article>
      `;
    }

    // Naloži vsa uporabnikova naročila.
    async function loadOrders() {
      const container = document.getElementById('orders-list');
      container.innerHTML = `
        <article class="admin-card my-orders-loading">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line"></div>
        </article>
        <article class="admin-card my-orders-loading">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line"></div>
        </article>
      `;
      await loadProductImageMap();
      const res = await fetch('/api/my-orders', { credentials: 'same-origin' });
      if (res.status === 401) {
        showToast('Najprej se prijavi.', 'error');
        window.location.href = 'prijava.html';
        return;
      }
      const orders = await res.json().catch(() => []);
      if (!orders.length) {
        container.innerHTML = `
          <article class="admin-card my-orders-empty">
            <div class="my-orders-empty-icon">📦</div>
            <h3>Še nimaš naročil</h3>
            <p>Ko oddate naročilo, bo vidno tukaj.</p>
            <a class="my-orders-empty-btn" href="index.html">Začni nakupovati</a>
          </article>
        `;
        return;
      }
      container.innerHTML = orders.map(orderCard).join('');
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
  </script>
</body>
</html>
