<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domen Core - Pozabljeno Geslo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-login auth-no-scroll">
  <section class="auth-shell">
    <div class="auth-side">
      <p class="auth-kicker">Obnova dostopa</p>
      <h1>Pozabljeno geslo</h1>
      <p>Vnesi email in ustvarimo reset link za zamenjavo gesla.</p>
    </div>
    <div class="container auth-card">
      <h2>Reset gesla</h2>
      <form id="forgot-form">
        <label for="email">Email:</label>
        <input id="email" type="email" required placeholder="vnesi email">
        <input type="submit" value="Pridobi reset link">
      </form>
      <p class="auth-alt-link"><a href="prijava.html">Nazaj na prijavo</a></p>
    </div>
  </section>

  <script src="zo.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      if (!emailPattern.test(email)) {
        showToast('Vnesi veljaven email naslov.', 'error');
        return;
      }
      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showToast(data.error || 'Napaka pri obnovi gesla.', 'error');
        return;
      }
      showToast(data.message || 'Preusmerjam na spremembo gesla...', 'success');
      if (data.resetLink) {
        setTimeout(() => {
          window.location.href = data.resetLink;
        }, 350);
      }
    });
  </script>
</body>
</html>
