<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Gesla</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-login">
  <section class="auth-shell">
    <div class="auth-side">
      <p class="auth-kicker">Reset</p>
      <h1>Novo geslo</h1>
      <p>Vnesi novo geslo (vsaj 7 znakov).</p>
    </div>
    <div class="container auth-card">
      <h2>Nastavi novo geslo</h2>
      <form id="reset-form">
        <label for="password">Novo geslo:</label>
        <input id="password" type="password" required minlength="7">
        <input type="submit" value="Shrani geslo">
      </form>
      <p class="auth-alt-link"><a href="prijava.html">Nazaj na prijavo</a></p>
    </div>
  </section>

  <script src="zo.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('password').value;
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showToast(data.error || 'Reset ni uspel.', 'error');
        return;
      }
      showToast(data.message || 'Geslo zamenjano.', 'success');
      setTimeout(() => {
        window.location.href = 'prijava.html';
      }, 900);
    });
  </script>
</body>
</html>
