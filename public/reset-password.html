<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domen Core - Ponastavitev Gesla</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-login auth-no-scroll">
  <section class="auth-shell">
    <div class="auth-side">
      <p class="auth-kicker">Reset</p>
      <h1>Novo geslo</h1>
      <p>Vnesi novo geslo (vsaj 8 znakov, velika/mala črka, številka in poseben znak).</p>
    </div>
    <div class="container auth-card">
      <h2>Nastavi novo geslo</h2>
      <form id="reset-form" data-skip-validation-assistant="true" novalidate>
        <label for="password">Novo geslo:</label>
        <div class="password-container">
          <input id="password" type="password" required minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z\\d]).{8,}$" autocomplete="new-password">
          <svg class="toggle-password" onclick="togglePassword('password')" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" title="Prikazi/skrij geslo">
            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
          </svg>
        </div>
        <label for="passwordConfirm">Ponovi novo geslo:</label>
        <div class="password-container">
          <input id="passwordConfirm" type="password" required minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z\\d]).{8,}$" autocomplete="new-password">
          <svg class="toggle-password" onclick="togglePassword('passwordConfirm')" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" title="Prikazi/skrij geslo">
            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
          </svg>
        </div>
        <input type="submit" value="Shrani geslo">
      </form>
      <p class="auth-alt-link"><a href="prijava.html">Nazaj na prijavo</a></p>
    </div>
  </section>

  <script src="zo.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenFromQuery = params.get('token') || '';
    if (tokenFromQuery) {
      sessionStorage.setItem('resetPasswordToken', tokenFromQuery);
      // Po inicializaciji skrij token iz URL-ja za lepši izpis v brskalniku.
      window.history.replaceState({}, '', '/reset-password.html');
    }
    const token = tokenFromQuery || sessionStorage.getItem('resetPasswordToken') || '';

    const passwordInput = document.getElementById('password');
    const passwordConfirmInput = document.getElementById('passwordConfirm');

    // Preklopi prikaz ali skrivanje gesla.
    function togglePassword(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = String(passwordInput.value || '');
      const confirmPassword = String(passwordConfirmInput.value || '');
      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;
      if (!newPassword || !confirmPassword) {
        showToast('Izpolni obe polji za geslo.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Gesli se ne ujemata.', 'error');
        return;
      }
      if (!strongPasswordPattern.test(newPassword)) {
        showToast('Geslo mora imeti vsaj 8 znakov ter veliko, malo črko, številko in poseben znak.', 'error');
        return;
      }
      if (!token) {
        showToast('Manjka token za reset gesla. Ponovi postopek.', 'error');
        return;
      }
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.error || 'Reset ni uspel.', 'error');
          return;
        }
        sessionStorage.removeItem('resetPasswordToken');
        showToast(data.message || 'Geslo zamenjano.', 'success');
        setTimeout(() => {
          window.location.href = 'prijava.html';
        }, 900);
      } catch (_err) {
        showToast('Povezava s strežnikom ni uspela. Poskusi znova.', 'error');
      }
    });
  </script>
</body>
</html>
